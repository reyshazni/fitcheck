version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    # Bugs
    - errcheck
    - govet
    - staticcheck
    - bodyclose
    - nilerr
    - sqlclosecheck
    - exhaustive
    - wrapcheck

    # Code reuse (DRY)
    - dupl
    - goconst

    # Style & consistency
    - revive
    - misspell
    - unconvert
    - unparam
    - interfacebloat
    - decorder

    # Complexity
    - cyclop
    - funlen
    - gocognit

    # Security
    - gosec

    # Performance
    - prealloc

  settings:
    funlen:
      lines: 80
      statements: 50
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    interfacebloat:
      max: 8
    decorder:
      dec-order:
        - type
        - const
        - var
        - func
      disable-dec-order-check: false
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 2
    exhaustive:
      default-signifies-exhaustive: false
    gosec:
      excludes:
        - G104

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
