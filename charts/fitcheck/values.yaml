replicaCount: 1

image:
  repository: ghcr.io/reyshazni/fitcheck
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

controller:
  metricsAddr: ":8080"
  healthAddr: ":8081"
  recheckInterval: "30s"
  initialDelay: "10s"
  startupTimeout: "10m"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
