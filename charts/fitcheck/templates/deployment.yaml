apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fitcheck.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fitcheck.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fitcheck.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fitcheck.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "fitcheck.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ include "fitcheck.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-addr={{ .Values.controller.metricsAddr }}
            - --health-addr={{ .Values.controller.healthAddr }}
            - --recheck-interval={{ .Values.controller.recheckInterval }}
            - --initial-delay={{ .Values.controller.initialDelay }}
            - --startup-timeout={{ .Values.controller.startupTimeout }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
      terminationGracePeriodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
